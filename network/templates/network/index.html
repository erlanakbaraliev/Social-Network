{% extends "network/layout.html" %}

{% block body %}
    <div id="main_view">
        {% if user.is_authenticated %}
            <div class="newpost">
                <!-- <h1>New post</h1> -->
                <form action="{% url 'new_post' %}" method="POST" class="p-3 shadow-sm bg-light">
                    {% csrf_token %}
                    <h3 class="mb-3">Create a New Post</h3>
                
                    <div class="form-group">
                        <textarea class="form-control" name="content" rows="4" placeholder="Write something..." required></textarea>
                    </div>
                
                    <button type="submit" class="btn btn-block btn-primary text-white">Post</button>
                </form>
            </div>
            <div class="posts" id="posts">

            </div>
        {% endif %}
    </div>
    <div id="profile_view">
        <h1>Profile</h1>
    </div>
{% endblock %}
